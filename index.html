<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TandangNews V2 — Onchain News Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans&family=DM+Mono&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
:root{
--bg:#0a0a0b;--card:#111;--border:#222;
--text:#e8e8ec;--muted:#888;--accent:#e8c547;
font-family:'DM Sans';
}

body{margin:0;background:var(--bg);color:var(--text);}

/* cinematic */
body::before{
content:'';
position:fixed;inset:0;
background: repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03) 0px,
rgba(255,255,255,0.03) 1px,
transparent 1px,
transparent 3px
);
opacity:.4;
}

/* header */
header{border-bottom:1px solid var(--border);}
.wrap{max-width:1100px;margin:auto;padding:14px;display:flex;justify-content:space-between;}
.logo{font-family:'Playfair Display';font-weight:900;}
.logo span{color:var(--accent);}

button{background:var(--accent);border:none;padding:6px 10px;cursor:pointer;}

main{max-width:1100px;margin:auto;padding:20px;}

.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;}
.feed{display:flex;flex-direction:column;gap:12px;}

.story{
background:var(--card);
padding:14px;
border:1px solid var(--border);
}

.meta{font-size:12px;color:var(--muted);}

input,textarea{width:100%;margin-top:6px;padding:8px;background:#000;color:#fff;border:1px solid #333;}
</style>
</head>

<body>

<header>
<div class="wrap">
<div class="logo">Tandang<span>News</span></div>
<div>
<a href="https://x.com/tandangnews" target="_blank"><button>X</button></a>
<button onclick="connect()">Connect</button>
</div>
</div>
</header>

<main>

<h1>Onchain News Engine</h1>

<div class="grid">

<!-- LEFT FEED -->
<div>

<div class="feed" id="feed"></div>

<div class="story">
<h3>Submit Story</h3>
<input id="title" placeholder="Headline"/>
<textarea id="content"></textarea>
<button onclick="submit()">Publish</button>
</div>

</div>

<!-- RIGHT PANEL -->
<div>

<div class="story">
<h3>Wallet</h3>
<div id="wallet">Not connected</div>
</div>

<div class="story">
<h3>AI Market</h3>
<div id="market">$120</div>
</div>

<div class="story">
<h3>Trending</h3>
<div id="trending"></div>
</div>

<div class="story">
<h3>Top Journalists</h3>
<div id="journalists"></div>
</div>

</div>

</div>

</main>

<script>
const conn=new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('devnet'));
let wallet=null;

let stories=[];
let journalists={};

/* connect */
async function connect(){
wallet=window.solana;
await wallet.connect();
document.getElementById("wallet").innerText=wallet.publicKey;
}

/* AI scoring */
function scoreStory(text){
return Math.min(100, text.length/10 + Math.random()*30);
}

/* publish */
function submit(){
const title=document.getElementById("title").value;
const content=document.getElementById("content").value;

const score=scoreStory(content);
const price=(100+score*2).toFixed(2);
const author="journalist_"+Math.floor(Math.random()*1000);

stories.unshift({
title,content,score,price,author,time:Date.now()
});

/* update journalist */
journalists[author]=(journalists[author]||0)+score;

render();
}

/* render */
function render(){

/* FEED */
const feed=document.getElementById("feed");
feed.innerHTML=stories
.sort((a,b)=>b.price-a.price)
.map(s=>`
<div class="story">
<b>${s.title}</b><br/>
<div class="meta">${s.author} • ${new Date(s.time).toLocaleTimeString()}</div>
<p>${s.content}</p>

💰 $${s.price} | 🧠 ${s.score.toFixed(1)}

<br/>
<button onclick="share('${s.title}')">Share X</button>
</div>
`).join("");

/* TRENDING */
const trending=document.getElementById("trending");
trending.innerHTML=stories.slice(0,5)
.map(s=>`🔥 ${s.title}`).join("<br/>");

/* JOURNALIST */
const j=document.getElementById("journalists");
j.innerHTML=Object.entries(journalists)
.sort((a,b)=>b[1]-a[1])
.slice(0,5)
.map(x=>`${x[0]} (${x[1].toFixed(1)})`)
.join("<br/>");

}

/* share */
function share(title){
const text=encodeURIComponent(`🧠 ${title}

Truth has a market price.
#Web3`);
window.open(`https://twitter.com/intent/tweet?text=${text}`);
}

/* market pulse */
setInterval(()=>{
document.getElementById("market").innerText="$"+(100+Math.random()*50).toFixed(2);
},2000);
</script>

</body>
</html>
