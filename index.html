<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TandangNews — Onchain Protocol</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono&family=DM+Sans&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body{margin:0;background:#0a0a0b;color:#e8e8ec;font-family:'DM Sans';}
.rain{position:fixed;inset:0;background:url("https://i.imgur.com/NM4Q9Wc.gif");opacity:0.05;pointer-events:none;}

.container{max-width:1000px;margin:auto;padding:20px;}
h1{font-family:'Playfair Display';font-size:40px;}

.glitch{position:relative;}
.glitch::after{content:attr(data-text);position:absolute;left:2px;top:2px;color:red;opacity:0.2;}

.card{background:#111;padding:15px;margin:10px 0;border:1px solid #222;}
button{background:#e8c547;border:none;padding:8px 14px;cursor:pointer;}
input,textarea{width:100%;padding:8px;margin-top:6px;background:#000;color:#fff;border:1px solid #333;}
.small{font-size:12px;color:#888;}
</style>
</head>

<body>

<div class="rain"></div>

<div class="container">

<h1 class="glitch" data-text="Truth Has a Market Price">
Truth Has a Market Price
</h1>

<div class="card">
<div id="wallet">Wallet: Not connected</div>
<button onclick="connectWallet()">Connect Phantom</button>
<button onclick="airdrop()">Airdrop</button>
</div>

<div class="card">
<h3>AI Price</h3>
<strong id="price">$120</strong>
</div>

<div class="card">
<h3>Bid</h3>
<input type="range" min="0" max="100" value="30" id="bid"/>
<div id="bidText">Bid: 30</div>
<button onclick="sendBid()">Send Bid</button>
</div>

<div class="card">
<h3>Submit Story</h3>
<input id="title" placeholder="Title"/>
<textarea id="content" placeholder="Content"></textarea>
<button onclick="submitStory()">Submit</button>
</div>

<div class="card">
<h3>Stories</h3>
<div id="stories"></div>
</div>

<div class="card">
<h3>Logs</h3>
<div id="logs" class="small"></div>
</div>

</div>

<script>
const connection = new solanaWeb3.Connection(
  solanaWeb3.clusterApiUrl('devnet'),
  'confirmed'
);

let wallet=null;
let stories=[];

/* CONNECT */
async function connectWallet(){
  wallet=window.solana;
  await wallet.connect();
  document.getElementById("wallet").innerText="Connected: "+wallet.publicKey;
}

/* AIRDROP */
async function airdrop(){
  if(!wallet) return alert("Connect first");
  const sig=await connection.requestAirdrop(wallet.publicKey,1e9);
  log("Airdrop: "+sig);
}

/* PRICE */
function updatePrice(){
  const bid=document.getElementById("bid").value;
  const price=100+bid*0.8+Math.random()*10;
  document.getElementById("price").innerText="$"+price.toFixed(2);
}
setInterval(updatePrice,2000);

/* BID */
async function sendBid(){
  if(!wallet) return alert("Connect first");

  const tx=new solanaWeb3.Transaction().add(
    solanaWeb3.SystemProgram.transfer({
      fromPubkey:wallet.publicKey,
      toPubkey:wallet.publicKey,
      lamports:1000
    })
  );

  tx.feePayer=wallet.publicKey;
  tx.recentBlockhash=(await connection.getLatestBlockhash()).blockhash;

  const signed=await wallet.signTransaction(tx);
  const sig=await connection.sendRawTransaction(signed.serialize());

  log("Bid TX: "+sig);
}

/* SUBMIT */
async function submitStory(){
  if(!wallet) return alert("Connect first");

  const title=document.getElementById("title").value;
  const content=document.getElementById("content").value;

  const tx=new solanaWeb3.Transaction().add(
    new solanaWeb3.TransactionInstruction({
      keys:[],
      programId:new solanaWeb3.PublicKey("MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr"),
      data:new TextEncoder().encode("Story:"+title)
    })
  );

  tx.feePayer=wallet.publicKey;
  tx.recentBlockhash=(await connection.getLatestBlockhash()).blockhash;

  const signed=await wallet.signTransaction(tx);
  const sig=await connection.sendRawTransaction(signed.serialize());

  stories.unshift({title,content,tx:sig});
  render();

  log("Story TX: "+sig);
}

/* RENDER */
function render(){
  const el=document.getElementById("stories");
  el.innerHTML='';
  stories.forEach(s=>{
    el.innerHTML+=`
    <div class="card">
      <b>${s.title}</b><br/>
      <span class="small">${s.content}</span><br/>
      TX: ${s.tx.slice(0,20)}...
    </div>`;
  });
}

/* SLIDER */
document.getElementById("bid").oninput=(e)=>{
  document.getElementById("bidText").innerText="Bid: "+e.target.value;
};

/* LOG */
function log(msg){
  const el=document.getElementById("logs");
  el.innerHTML="<div>"+msg+"</div>"+el.innerHTML;
}
</script>

</body>
</html>
